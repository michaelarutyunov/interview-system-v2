# Interview session configuration
#
# This file centralizes all interview-specific configuration parameters.
# Changes to this file do not require code changes.

# ============================================================================
# Interview Session Configuration
# ============================================================================
# Used by:
# - src/domain/models/interview_state.py:247 (termination check)
# - ui/components/metrics.py:67 (progress display)
# - ui/components/controls.py:82 (slider default)
session:
  # Calculated from phases (exploratory + focused + closing)
  # Can be overridden via API: config={"max_turns": custom_value}
  # Default sum: exploratory.n_turns + focused.n_turns + closing.n_turns = 8 + 8 + 4 = 20
  # Note: Omitting max_turns here triggers auto-calculation from phases

# ============================================================================
# Phase Configuration (deterministic turn-based)
# ============================================================================
# Used by: src/services/strategy_service.py:_determine_phase()
#
# Phase transition rules:
# - exploratory: turns 1 to n_turns (exclusive)
# - focused: turns (exploratory.n_turns + 1) to (exploratory + focused.n_turns)
# - closing: after focused phase, until session.max_turns
#
# Phases control which strategies are boosted via phase_profiles in config/scoring.yaml
phases:
  exploratory:
    n_turns: 8  # Focus on breadth exploration
  focused:
    n_turns: 8  # Balance depth and breadth
  closing:
    n_turns: 4  # Wrap up — begins at turn 17 (8+8+1)

# ============================================================================
# Session Service Configuration
# ============================================================================
# Used by: src/services/session_service.py
# - context_utterance_limit: Line 456 (get_conversation_context)
# - context_node_limit: Line 464 (get_recent_nodes)
# - extraction_context_limit: Line 542 (_extract_from_text)
session_service:
  # Number of recent utterances to include in LLM context
  context_utterance_limit: 10
  # Number of recent graph nodes to include in context
  context_node_limit: 5
  # Number of recent utterances to include in extraction context
  extraction_context_limit: 5

# ============================================================================
# Deduplication Thresholds
# ============================================================================
# Used by:
# - src/services/graph_service.py (surface_similarity_threshold)
# - src/services/canonical_slot_service.py (canonical_similarity_threshold, canonical_min_support_nodes)
# - src/persistence/repositories/canonical_slot_repo.py (canonical_similarity_threshold)
#
# Canonical slots have a two-stage lifecycle:
#   1. "candidate" - Newly proposed, not yet trusted
#   2. "active" - Promoted after earning sufficient support
deduplication:
  # Cosine similarity threshold for surface node semantic dedup.
  # Higher than canonical to preserve concept granularity at surface layer.
  surface_similarity_threshold: 0.80
  # Cosine similarity threshold for merging canonical slots.
  # 0.60 targets 10-25% compression for JTBD interviews (all-MiniLM-L6-v2).
  canonical_similarity_threshold: 0.60
  # Minimum surface nodes mapped to a candidate slot before promotion to 'active'.
  canonical_min_support_nodes: 2

# ============================================================================
# LLM Provider Configuration
# ============================================================================
# Each pipeline call type can use a different provider/model for A/B testing.
# Only provider and model are required — temperature, max_tokens, timeout, effort
# have sensible defaults in the Pydantic model and can be omitted here.
# API keys are set via environment variables in .env (not here).
llm:
  # Stage 3: concept/relationship extraction from user responses
  extraction:
    provider: anthropic
    model: claude-sonnet-4-6
    # effort: low
  # Stage 4.5: canonical slot discovery (structured JSON extraction)
  slot_scoring:
    provider: anthropic
    model: claude-haiku-4-5
  # Stage 6: LLM signal detection (response_depth, engagement, hedging, etc.)
  signal_scoring:
    provider: kimi
    model: kimi-k2-0905-preview
  # Stage 8 + opening question: next question generation
  question_generation:
    provider: anthropic
    model: claude-haiku-4-5
